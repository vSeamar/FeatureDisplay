<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos - Feature Display</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">FeatureDisplay</a>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="todos.html" class="active">Todos</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="data.html">Data Table</a></li>
      <li><a href="forms.html">Forms</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Todo List</h1>
        <div class="btn-group">
          <button class="btn btn-success" id="addTodoBtn">Add Todo</button>
          <button class="btn btn-outline" id="bulkSelectBtn">Select All</button>
          <button class="btn btn-danger" id="deleteSelectedBtn" disabled>Delete Selected</button>
        </div>
      </div>

      <!-- Filters and Search -->
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
        <div class="search-box" style="flex: 1; min-width: 200px;">
          <input type="text" class="form-control" id="searchTodos" placeholder="Search todos...">
        </div>
        <select class="form-control" id="filterStatus" style="width: auto;">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
        <select class="form-control" id="filterPriority" style="width: auto;">
          <option value="all">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="form-control" id="sortBy" style="width: auto;">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="priority">By Priority</option>
          <option value="alphabetical">Alphabetical</option>
        </select>
      </div>

      <!-- Todo Stats -->
      <div style="display: flex; gap: 2rem; margin-bottom: 1rem; padding: 1rem; background: var(--light-color); border-radius: 4px;">
        <div>Total: <strong id="statTotal">0</strong></div>
        <div>Pending: <strong id="statPending">0</strong></div>
        <div>Completed: <strong id="statCompleted">0</strong></div>
        <div>
          Progress:
          <div class="progress" style="width: 100px; display: inline-block; vertical-align: middle;">
            <div class="progress-bar" id="todoProgress" style="width: 0%"></div>
          </div>
          <strong id="statPercent">0%</strong>
        </div>
      </div>

      <!-- Todo List -->
      <ul class="list" id="todoList">
        <li class="empty-state">
          <div class="empty-state-icon">📋</div>
          <p>Loading todos...</p>
        </li>
      </ul>
    </div>
  </div>

  <!-- Add/Edit Todo Modal -->
  <div class="modal-overlay" id="todoModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Todo</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="todoId">
        <div class="form-group">
          <label for="todoText">Todo Text *</label>
          <input type="text" class="form-control" id="todoText" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label for="todoPriority">Priority</label>
          <select class="form-control" id="todoPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="todoCompleted"> Mark as completed
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveTodoBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="storage.js"></script>
  <script>
    let todos = [];
    let selectedTodos = new Set();

    // DOM Elements
    const todoList = document.getElementById('todoList');
    const todoModal = document.getElementById('todoModal');
    const searchInput = document.getElementById('searchTodos');
    const filterStatus = document.getElementById('filterStatus');
    const filterPriority = document.getElementById('filterPriority');
    const sortBy = document.getElementById('sortBy');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTodos();
      loadTheme();
    });

    // Load theme
    function loadTheme() {
      const settings = Storage.getSettings();
      if (settings.theme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    }

    // Load todos
    function loadTodos() {
      todos = Storage.getTodos();
      renderTodos();
      updateStats();
    }

    // Render todos with filters and sorting
    function renderTodos() {
      let filtered = [...todos];

      // Search filter
      const searchTerm = searchInput.value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(t => t.text.toLowerCase().includes(searchTerm));
      }

      // Status filter
      if (filterStatus.value !== 'all') {
        filtered = filtered.filter(t =>
          filterStatus.value === 'completed' ? t.completed : !t.completed
        );
      }

      // Priority filter
      if (filterPriority.value !== 'all') {
        filtered = filtered.filter(t => t.priority === filterPriority.value);
      }

      // Sorting
      const priorityOrder = { high: 0, medium: 1, low: 2 };
      switch (sortBy.value) {
        case 'oldest':
          filtered.sort((a, b) => a.id - b.id);
          break;
        case 'newest':
          filtered.sort((a, b) => b.id - a.id);
          break;
        case 'priority':
          filtered.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
          break;
        case 'alphabetical':
          filtered.sort((a, b) => a.text.localeCompare(b.text));
          break;
      }

      if (filtered.length === 0) {
        todoList.innerHTML = `
          <li class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>No todos found. ${searchTerm || filterStatus.value !== 'all' || filterPriority.value !== 'all' ? 'Try adjusting your filters.' : 'Add one!'}</p>
          </li>
        `;
        return;
      }

      todoList.innerHTML = filtered.map(todo => `
        <li class="list-item" data-id="${todo.id}">
          <div style="display: flex; align-items: center; gap: 1rem; flex: 1;">
            <input type="checkbox" class="select-todo" data-id="${todo.id}" ${selectedTodos.has(todo.id) ? 'checked' : ''}>
            <input type="checkbox" class="toggle-complete" ${todo.completed ? 'checked' : ''} onchange="toggleComplete(${todo.id}, this.checked)" title="Toggle completion">
            <span style="${todo.completed ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${escapeHtml(todo.text)}</span>
            <span class="badge badge-${todo.priority === 'high' ? 'danger' : todo.priority === 'low' ? 'info' : 'warning'}">${todo.priority}</span>
            ${todo.completed ? '<span class="badge badge-success">Done</span>' : ''}
          </div>
          <div class="btn-group">
            <button class="btn btn-sm btn-outline" onclick="editTodo(${todo.id})" title="Edit">Edit</button>
            <button class="btn btn-sm btn-warning" onclick="duplicateTodo(${todo.id})" title="Duplicate">Clone</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTodo(${todo.id})" title="Delete">Delete</button>
          </div>
        </li>
      `).join('');

      // Add selection listeners
      document.querySelectorAll('.select-todo').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
          const id = parseInt(this.dataset.id);
          if (this.checked) {
            selectedTodos.add(id);
          } else {
            selectedTodos.delete(id);
          }
          updateDeleteButton();
        });
      });
    }

    // Update stats
    function updateStats() {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      const pending = total - completed;
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statPercent').textContent = percent + '%';
      document.getElementById('todoProgress').style.width = percent + '%';
    }

    // Update delete button state
    function updateDeleteButton() {
      document.getElementById('deleteSelectedBtn').disabled = selectedTodos.size === 0;
    }

    // Toggle todo completion
    function toggleComplete(id, completed) {
      Storage.updateTodo(id, { completed });
      const todo = todos.find(t => t.id === id);
      if (todo) todo.completed = completed;
      renderTodos();
      updateStats();
      showToast(completed ? 'Todo completed!' : 'Todo marked as pending', 'success');
    }

    // Edit todo
    function editTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      document.getElementById('modalTitle').textContent = 'Edit Todo';
      document.getElementById('todoId').value = id;
      document.getElementById('todoText').value = todo.text;
      document.getElementById('todoPriority').value = todo.priority;
      document.getElementById('todoCompleted').checked = todo.completed;
      todoModal.classList.add('active');
    }

    // Duplicate todo
    function duplicateTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      const newTodo = Storage.addTodo({
        text: todo.text + ' (copy)',
        priority: todo.priority
      });
      todos.push(newTodo);
      renderTodos();
      updateStats();
      showToast('Todo duplicated!', 'success');
    }

    // Delete todo
    function deleteTodo(id) {
      if (!confirm('Are you sure you want to delete this todo?')) return;

      Storage.deleteTodo(id);
      todos = todos.filter(t => t.id !== id);
      selectedTodos.delete(id);
      renderTodos();
      updateStats();
      updateDeleteButton();
      showToast('Todo deleted', 'success');
    }

    // Add todo button
    document.getElementById('addTodoBtn').addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'Add Todo';
      document.getElementById('todoId').value = '';
      document.getElementById('todoText').value = '';
      document.getElementById('todoPriority').value = 'medium';
      document.getElementById('todoCompleted').checked = false;
      todoModal.classList.add('active');
      document.getElementById('todoText').focus();
    });

    // Save todo
    document.getElementById('saveTodoBtn').addEventListener('click', () => {
      const id = document.getElementById('todoId').value;
      const text = document.getElementById('todoText').value.trim();
      const priority = document.getElementById('todoPriority').value;
      const completed = document.getElementById('todoCompleted').checked;

      if (!text) {
        showToast('Please enter todo text', 'error');
        return;
      }

      if (id) {
        // Update existing
        Storage.updateTodo(parseInt(id), { text, priority, completed });
        const todo = todos.find(t => t.id === parseInt(id));
        if (todo) {
          todo.text = text;
          todo.priority = priority;
          todo.completed = completed;
        }
        showToast('Todo updated!', 'success');
      } else {
        // Create new
        const newTodo = Storage.addTodo({ text, priority });
        if (completed) {
          Storage.updateTodo(newTodo.id, { completed: true });
          newTodo.completed = true;
        }
        todos.push(newTodo);
        showToast('Todo added!', 'success');
      }

      closeModal();
      renderTodos();
      updateStats();
    });

    // Bulk select
    document.getElementById('bulkSelectBtn').addEventListener('click', () => {
      const allSelected = selectedTodos.size === todos.length;

      if (allSelected) {
        selectedTodos.clear();
        document.getElementById('bulkSelectBtn').textContent = 'Select All';
      } else {
        todos.forEach(t => selectedTodos.add(t.id));
        document.getElementById('bulkSelectBtn').textContent = 'Deselect All';
      }

      renderTodos();
      updateDeleteButton();
    });

    // Delete selected
    document.getElementById('deleteSelectedBtn').addEventListener('click', () => {
      if (selectedTodos.size === 0) return;
      if (!confirm(`Delete ${selectedTodos.size} selected todos?`)) return;

      for (const id of selectedTodos) {
        Storage.deleteTodo(id);
      }
      todos = todos.filter(t => !selectedTodos.has(t.id));
      selectedTodos.clear();
      renderTodos();
      updateStats();
      updateDeleteButton();
      document.getElementById('bulkSelectBtn').textContent = 'Select All';
      showToast('Selected todos deleted', 'success');
    });

    // Filter listeners
    searchInput.addEventListener('input', renderTodos);
    filterStatus.addEventListener('change', renderTodos);
    filterPriority.addEventListener('change', renderTodos);
    sortBy.addEventListener('change', renderTodos);

    // Close modal
    function closeModal() {
      todoModal.classList.remove('active');
    }

    todoModal.addEventListener('click', (e) => {
      if (e.target === todoModal) closeModal();
    });

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Toast
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <span style="color: ${type === 'success' ? 'var(--success-color)' : type === 'error' ? 'var(--danger-color)' : 'var(--info-color)'}">${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}</span>
        ${message}
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
