<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Table - Feature Display</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><img src="logo.svg" alt="FeatureDisplay logo" class="logo-icon">FeatureDisplay</a>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="todos.html">Todos</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="data.html" class="active">Data Table</a></li>
      <li><a href="forms.html">Forms</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Data Table</h1>
        <div class="btn-group">
          <button class="btn btn-success" id="addRowBtn">Add Row</button>
          <button class="btn btn-info" id="exportCSV">Export CSV</button>
          <button class="btn btn-warning" id="resetData">Reset Data</button>
        </div>
      </div>

      <!-- Search and Filters -->
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;">
        <div class="search-box" style="flex: 1; min-width: 200px;">
          <input type="text" class="form-control" id="searchTable" placeholder="Search table...">
        </div>
        <select class="form-control" id="filterDepartment" style="width: auto;">
          <option value="">All Departments</option>
          <option value="Engineering">Engineering</option>
          <option value="Marketing">Marketing</option>
          <option value="Sales">Sales</option>
          <option value="HR">HR</option>
          <option value="Finance">Finance</option>
        </select>
        <select class="form-control" id="filterStatus" style="width: auto;">
          <option value="">All Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
          <option value="Pending">Pending</option>
        </select>
        <select class="form-control" id="rowsPerPage" style="width: auto;">
          <option value="5">5 rows</option>
          <option value="10" selected>10 rows</option>
          <option value="25">25 rows</option>
          <option value="50">50 rows</option>
        </select>
      </div>

      <!-- Bulk Actions -->
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center;">
        <label style="display: flex; align-items: center; gap: 0.5rem;">
          <input type="checkbox" id="selectAll">
          Select All
        </label>
        <span id="selectedCount">0 selected</span>
        <button class="btn btn-sm btn-danger" id="deleteSelected" disabled>Delete Selected</button>
        <button class="btn btn-sm btn-secondary" id="updateStatus" disabled>Update Status</button>
      </div>

      <!-- Data Table -->
      <div style="overflow-x: auto;">
        <table class="table" id="dataTable">
          <thead>
            <tr>
              <th style="width: 40px;"></th>
              <th data-sort="id">ID</th>
              <th data-sort="name">Name</th>
              <th data-sort="email">Email</th>
              <th data-sort="department">Department</th>
              <th data-sort="salary">Salary</th>
              <th data-sort="status">Status</th>
              <th data-sort="joinDate">Join Date</th>
              <th style="width: 150px;">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="9" style="text-align: center; padding: 2rem;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
        <div id="pageInfo">Showing 0-0 of 0</div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Row Modal -->
  <div class="modal-overlay" id="rowModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="rowModalTitle">Add Row</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rowId">
        <div class="form-row">
          <div class="form-group">
            <label for="rowName">Name *</label>
            <input type="text" class="form-control" id="rowName" placeholder="Full name">
          </div>
          <div class="form-group">
            <label for="rowEmail">Email *</label>
            <input type="email" class="form-control" id="rowEmail" placeholder="email@example.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="rowDepartment">Department</label>
            <select class="form-control" id="rowDepartment">
              <option value="Engineering">Engineering</option>
              <option value="Marketing">Marketing</option>
              <option value="Sales">Sales</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
            </select>
          </div>
          <div class="form-group">
            <label for="rowSalary">Salary</label>
            <input type="number" class="form-control" id="rowSalary" placeholder="50000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="rowStatus">Status</label>
            <select class="form-control" id="rowStatus">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="Pending">Pending</option>
            </select>
          </div>
          <div class="form-group">
            <label for="rowJoinDate">Join Date</label>
            <input type="date" class="form-control" id="rowJoinDate">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveRowBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Update Status Modal -->
  <div class="modal-overlay" id="statusModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Update Status</h3>
        <button class="modal-close" onclick="closeStatusModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="newStatus">New Status</label>
          <select class="form-control" id="newStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Pending">Pending</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeStatusModal()">Cancel</button>
        <button class="btn btn-primary" id="applyStatusBtn">Apply</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="storage.js"></script>
  <script>
    // Sample data
    let data = [
      { id: 1, name: 'John Smith', email: 'john.smith@example.com', department: 'Engineering', salary: 85000, status: 'Active', joinDate: '2022-03-15' },
      { id: 2, name: 'Sarah Johnson', email: 'sarah.j@example.com', department: 'Marketing', salary: 72000, status: 'Active', joinDate: '2021-06-20' },
      { id: 3, name: 'Mike Williams', email: 'mike.w@example.com', department: 'Sales', salary: 68000, status: 'Inactive', joinDate: '2020-11-01' },
      { id: 4, name: 'Emily Brown', email: 'emily.b@example.com', department: 'HR', salary: 65000, status: 'Active', joinDate: '2023-01-10' },
      { id: 5, name: 'David Lee', email: 'david.lee@example.com', department: 'Finance', salary: 90000, status: 'Pending', joinDate: '2023-09-05' },
      { id: 6, name: 'Lisa Anderson', email: 'lisa.a@example.com', department: 'Engineering', salary: 95000, status: 'Active', joinDate: '2019-04-22' },
      { id: 7, name: 'James Wilson', email: 'james.w@example.com', department: 'Marketing', salary: 75000, status: 'Active', joinDate: '2022-07-18' },
      { id: 8, name: 'Jennifer Taylor', email: 'jennifer.t@example.com', department: 'Sales', salary: 71000, status: 'Inactive', joinDate: '2021-02-28' },
      { id: 9, name: 'Robert Martin', email: 'robert.m@example.com', department: 'Engineering', salary: 88000, status: 'Active', joinDate: '2020-08-14' },
      { id: 10, name: 'Amanda Garcia', email: 'amanda.g@example.com', department: 'HR', salary: 67000, status: 'Pending', joinDate: '2023-11-30' },
      { id: 11, name: 'Chris Thompson', email: 'chris.t@example.com', department: 'Finance', salary: 82000, status: 'Active', joinDate: '2021-09-12' },
      { id: 12, name: 'Michelle Rodriguez', email: 'michelle.r@example.com', department: 'Marketing', salary: 78000, status: 'Active', joinDate: '2022-12-05' },
      { id: 13, name: 'Daniel Kim', email: 'daniel.k@example.com', department: 'Engineering', salary: 92000, status: 'Active', joinDate: '2019-01-20' },
      { id: 14, name: 'Jessica White', email: 'jessica.w@example.com', department: 'Sales', salary: 69000, status: 'Inactive', joinDate: '2020-05-18' },
      { id: 15, name: 'Kevin Chen', email: 'kevin.c@example.com', department: 'Finance', salary: 86000, status: 'Active', joinDate: '2022-04-01' },
    ];

    let selectedRows = new Set();
    let currentPage = 1;
    let sortColumn = 'id';
    let sortDirection = 'asc';

    // DOM Elements
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchTable');
    const filterDepartment = document.getElementById('filterDepartment');
    const filterStatus = document.getElementById('filterStatus');
    const rowsPerPage = document.getElementById('rowsPerPage');
    const rowModal = document.getElementById('rowModal');
    const statusModal = document.getElementById('statusModal');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTheme();
      renderTable();
      setupSorting();
    });

    // Load theme
    function loadTheme() {
      const settings = Storage.getSettings();
      if (settings.theme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    }

    // Get filtered and sorted data
    function getProcessedData() {
      let result = [...data];

      // Search
      const searchTerm = searchInput.value.toLowerCase();
      if (searchTerm) {
        result = result.filter(row =>
          row.name.toLowerCase().includes(searchTerm) ||
          row.email.toLowerCase().includes(searchTerm) ||
          row.department.toLowerCase().includes(searchTerm)
        );
      }

      // Filter by department
      if (filterDepartment.value) {
        result = result.filter(row => row.department === filterDepartment.value);
      }

      // Filter by status
      if (filterStatus.value) {
        result = result.filter(row => row.status === filterStatus.value);
      }

      // Sort
      result.sort((a, b) => {
        let valA = a[sortColumn];
        let valB = b[sortColumn];

        if (typeof valA === 'string') {
          valA = valA.toLowerCase();
          valB = valB.toLowerCase();
        }

        if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
        if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
        return 0;
      });

      return result;
    }

    // Render table
    function renderTable() {
      const processed = getProcessedData();
      const perPage = parseInt(rowsPerPage.value);
      const totalPages = Math.ceil(processed.length / perPage);
      currentPage = Math.min(currentPage, Math.max(1, totalPages));

      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageData = processed.slice(start, end);

      if (pageData.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="9" style="text-align: center; padding: 2rem;">No data found</td>
          </tr>
        `;
      } else {
        tableBody.innerHTML = pageData.map(row => `
          <tr data-id="${row.id}">
            <td><input type="checkbox" class="row-select" data-id="${row.id}" ${selectedRows.has(row.id) ? 'checked' : ''}></td>
            <td>${row.id}</td>
            <td>${escapeHtml(row.name)}</td>
            <td>${escapeHtml(row.email)}</td>
            <td><span class="badge badge-info">${row.department}</span></td>
            <td>$${row.salary.toLocaleString()}</td>
            <td><span class="badge badge-${row.status === 'Active' ? 'success' : row.status === 'Inactive' ? 'danger' : 'warning'}">${row.status}</span></td>
            <td>${row.joinDate}</td>
            <td>
              <div class="btn-group">
                <button class="btn btn-sm btn-outline" onclick="editRow(${row.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteRow(${row.id})">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');

        // Add selection listeners
        document.querySelectorAll('.row-select').forEach(checkbox => {
          checkbox.addEventListener('change', function() {
            const id = parseInt(this.dataset.id);
            if (this.checked) {
              selectedRows.add(id);
            } else {
              selectedRows.delete(id);
            }
            updateSelectionUI();
          });
        });
      }

      // Update pagination
      renderPagination(totalPages);
      document.getElementById('pageInfo').textContent =
        `Showing ${processed.length > 0 ? start + 1 : 0}-${Math.min(end, processed.length)} of ${processed.length}`;

      updateSelectionUI();
    }

    // Render pagination
    function renderPagination(totalPages) {
      const pagination = document.getElementById('pagination');
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>First</button>`;
      html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>`;

      for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
      }

      html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;
      html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Last</button>`;

      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      renderTable();
    }

    // Setup sorting
    function setupSorting() {
      document.querySelectorAll('th[data-sort]').forEach(th => {
        th.addEventListener('click', function() {
          const column = this.dataset.sort;
          if (sortColumn === column) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
          } else {
            sortColumn = column;
            sortDirection = 'asc';
          }
          renderTable();

          // Update header indicators
          document.querySelectorAll('th[data-sort]').forEach(h => {
            h.textContent = h.textContent.replace(/ [↑↓]$/, '');
          });
          this.textContent += sortDirection === 'asc' ? ' ↑' : ' ↓';
        });
      });
    }

    // Update selection UI
    function updateSelectionUI() {
      document.getElementById('selectedCount').textContent = `${selectedRows.size} selected`;
      document.getElementById('deleteSelected').disabled = selectedRows.size === 0;
      document.getElementById('updateStatus').disabled = selectedRows.size === 0;
      document.getElementById('selectAll').checked = selectedRows.size === data.length && data.length > 0;
    }

    // Select all
    document.getElementById('selectAll').addEventListener('change', function() {
      if (this.checked) {
        data.forEach(row => selectedRows.add(row.id));
      } else {
        selectedRows.clear();
      }
      renderTable();
    });

    // Delete selected
    document.getElementById('deleteSelected').addEventListener('click', () => {
      if (selectedRows.size === 0) return;
      if (!confirm(`Delete ${selectedRows.size} selected rows?`)) return;

      data = data.filter(row => !selectedRows.has(row.id));
      selectedRows.clear();
      renderTable();
      showToast('Rows deleted', 'success');
    });

    // Update status
    document.getElementById('updateStatus').addEventListener('click', () => {
      if (selectedRows.size === 0) return;
      statusModal.classList.add('active');
    });

    document.getElementById('applyStatusBtn').addEventListener('click', () => {
      const newStatus = document.getElementById('newStatus').value;
      data.forEach(row => {
        if (selectedRows.has(row.id)) {
          row.status = newStatus;
        }
      });
      closeStatusModal();
      renderTable();
      showToast(`Status updated to ${newStatus}`, 'success');
    });

    // Add row
    document.getElementById('addRowBtn').addEventListener('click', () => {
      document.getElementById('rowModalTitle').textContent = 'Add Row';
      document.getElementById('rowId').value = '';
      document.getElementById('rowName').value = '';
      document.getElementById('rowEmail').value = '';
      document.getElementById('rowDepartment').value = 'Engineering';
      document.getElementById('rowSalary').value = '';
      document.getElementById('rowStatus').value = 'Active';
      document.getElementById('rowJoinDate').value = new Date().toISOString().split('T')[0];
      rowModal.classList.add('active');
    });

    // Edit row
    function editRow(id) {
      const row = data.find(r => r.id === id);
      if (!row) return;

      document.getElementById('rowModalTitle').textContent = 'Edit Row';
      document.getElementById('rowId').value = id;
      document.getElementById('rowName').value = row.name;
      document.getElementById('rowEmail').value = row.email;
      document.getElementById('rowDepartment').value = row.department;
      document.getElementById('rowSalary').value = row.salary;
      document.getElementById('rowStatus').value = row.status;
      document.getElementById('rowJoinDate').value = row.joinDate;
      rowModal.classList.add('active');
    }

    // Save row
    document.getElementById('saveRowBtn').addEventListener('click', () => {
      const id = document.getElementById('rowId').value;
      const name = document.getElementById('rowName').value.trim();
      const email = document.getElementById('rowEmail').value.trim();
      const department = document.getElementById('rowDepartment').value;
      const salary = parseInt(document.getElementById('rowSalary').value) || 0;
      const status = document.getElementById('rowStatus').value;
      const joinDate = document.getElementById('rowJoinDate').value;

      if (!name || !email) {
        showToast('Please fill in required fields', 'error');
        return;
      }

      if (id) {
        // Update
        const row = data.find(r => r.id === parseInt(id));
        if (row) {
          Object.assign(row, { name, email, department, salary, status, joinDate });
        }
        showToast('Row updated', 'success');
      } else {
        // Add
        const newId = Math.max(...data.map(r => r.id), 0) + 1;
        data.push({ id: newId, name, email, department, salary, status, joinDate });
        showToast('Row added', 'success');
      }

      closeModal();
      renderTable();
    });

    // Delete row
    function deleteRow(id) {
      if (!confirm('Delete this row?')) return;
      data = data.filter(r => r.id !== id);
      selectedRows.delete(id);
      renderTable();
      showToast('Row deleted', 'success');
    }

    // Export CSV
    document.getElementById('exportCSV').addEventListener('click', () => {
      const headers = ['ID', 'Name', 'Email', 'Department', 'Salary', 'Status', 'Join Date'];
      const rows = getProcessedData().map(r => [r.id, r.name, r.email, r.department, r.salary, r.status, r.joinDate]);
      const csv = [headers, ...rows].map(row => row.join(',')).join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data-export.csv';
      a.click();
      showToast('CSV exported', 'success');
    });

    // Reset data
    document.getElementById('resetData').addEventListener('click', () => {
      if (!confirm('Reset all data to defaults?')) return;
      location.reload();
    });

    // Filter listeners
    searchInput.addEventListener('input', () => { currentPage = 1; renderTable(); });
    filterDepartment.addEventListener('change', () => { currentPage = 1; renderTable(); });
    filterStatus.addEventListener('change', () => { currentPage = 1; renderTable(); });
    rowsPerPage.addEventListener('change', () => { currentPage = 1; renderTable(); });

    // Close modals
    function closeModal() {
      rowModal.classList.remove('active');
    }

    function closeStatusModal() {
      statusModal.classList.remove('active');
    }

    rowModal.addEventListener('click', (e) => {
      if (e.target === rowModal) closeModal();
    });

    statusModal.addEventListener('click', (e) => {
      if (e.target === statusModal) closeStatusModal();
    });

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Toast
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <span style="color: ${type === 'success' ? 'var(--success-color)' : type === 'error' ? 'var(--danger-color)' : 'var(--info-color)'}">${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}</span>
        ${message}
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
